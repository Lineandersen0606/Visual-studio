<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <h1>My page</h1>

    <button class="navBtn" onclick="goBack()">← Return</button>

    <h2 class="calendarTitle">My calendar</h2>

    <div class="calendar-nav">
        <button onclick="prevMonth()">←</button>
        <div id="calendarMonth"></div>
        <button onclick="nextMonth()">→</button>
    </div>

    <div id="calendar"></div>

    <h2 class="calendarTitle" style="margin-top:25px;">Events created by Me</h2>
    <div id="myEvents"></div>

</div>

<div id="eventPopup" class="popup hidden">
    <div class="popup-content">
        <h2 id="popupTitle"></h2>
        <p id="popupLocation"></p>
        <p id="popupTime"></p>
        <p id="popupPeople"></p>

        <button class="join" onclick="unregisterFromPopup()">Unregister from event</button>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script src="script.js"></script>

<script>
    renderCalendar();
    renderMyEvents();
</script>

</body>
</html>
